<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Journal - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient vintage background decoration (corner flourishes, ink blot, doodles, stitched edge) -->
  <div class="bg-decor" aria-hidden="true">
    <span class="bg-corner corner-tl"></span>
    <span class="bg-corner corner-tr"></span>
    <span class="bg-corner corner-bl"></span>
    <span class="bg-corner corner-br"></span>
    <span class="bg-inkblot"></span>
    <span class="bg-doodle doodle-star-1"></span>
    <span class="bg-doodle doodle-star-2"></span>
    <span class="bg-stitch"></span>
  </div>

  <!-- Falling autumn leaves -->
  <div class="bg-leaves" aria-hidden="true">
    <span class="leaf leaf-1"></span>
    <span class="leaf leaf-2"></span>
    <span class="leaf leaf-3"></span>
    <span class="leaf leaf-4"></span>
    <span class="leaf leaf-5"></span>
    <span class="leaf leaf-6"></span>
    <span class="leaf leaf-7"></span>
    <span class="leaf leaf-8"></span>
  </div>

  <div class="auth-container">

    <!-- corner flourishes on the card itself -->
    <span class="auth-corner auth-corner-tl" aria-hidden="true"></span>
    <span class="auth-corner auth-corner-tr" aria-hidden="true"></span>
    <span class="auth-corner auth-corner-bl" aria-hidden="true"></span>
    <span class="auth-corner auth-corner-br" aria-hidden="true"></span>

    <!-- wax seal emblem -->
    <div class="auth-seal" aria-hidden="true">J</div>

    <div id="login-form">
      <h1>Welcome back 👋</h1>
      <p class="subtitle">Sign in to your Journal account</p>
      <div class="ornate-divider" aria-hidden="true"><span>❧</span></div>

      <label>Email or Username</label>
      <div class="input-icon">
        <span>📧</span>
        <input type="text" id="login-identifier" placeholder="user@journal.com" />
      </div>

      <label>Password</label>
      <div class="input-icon">
        <span>🔒</span>
        <input type="password" id="login-password" placeholder="Enter your password" />
      </div>

      <button id="login-btn">LOG IN</button>
      <p id="login-error" class="error"></p>
      <p class="switch-text">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
    </div>

    <div id="signup-form" class="hidden">
      <h1>Create Account</h1>
      <p class="subtitle">Join Journal and start writing</p>
      <div class="ornate-divider" aria-hidden="true"><span>❧</span></div>

      <label>Full Name</label>
      <div class="input-icon">
        <span>👤</span>
        <input type="text" id="signup-fullname" placeholder="Juan dela Cruz" />
      </div>

      <label>Username</label>
      <div class="input-icon">
        <span>@</span>
        <input type="text" id="signup-username" placeholder="juandelacruz" />
      </div>

      <label>Email Address</label>
      <div class="input-icon">
        <span>📧</span>
        <input type="email" id="signup-email" placeholder="user@journal.com" />
      </div>

      <label>Password</label>
      <div class="input-icon">
        <span>🔒</span>
        <input type="password" id="signup-password" placeholder="At least 8 characters" />
      </div>

      <label>Confirm Password</label>
      <div class="input-icon">
        <span>🔒</span>
        <input type="password" id="signup-confirm-password" placeholder="Re-enter your password" />
      </div>

      <button id="signup-btn">CREATE ACCOUNT</button>
      <p id="signup-error" class="error"></p>
      <p class="switch-text">Already have an account? <a href="#" id="show-login">Log in</a></p>
    </div>

  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
